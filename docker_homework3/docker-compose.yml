services:
  films1:
    build: .
    image: film-app

    environment:
      MAX_FILMS: 7
      DATA_FILE_PATH: "./films.json"

    ports:
        - "8081:8080"

    volumes:
      - ./films.json:/app/films.json


  films2:
    build: .
    image: film-app

    environment:
      MAX_FILMS: 10
      DATA_FILE_PATH: "./films.json"

    ports:
        - "8082:8080"

    volumes:
      - ./films.json:/app/films.json
